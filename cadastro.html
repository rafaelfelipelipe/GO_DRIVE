<!DOCTYPE HTML>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO DRIVE - CADASTRO</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <style>
        .conteudo-cadastro {
            max-width: 600px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: left;
            font-family: Arial, sans-serif;
        }

        .conteudo-cadastro h1 {
            color: #022745;
            border-bottom: 3px solid #FF6B35;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }

        .form-grupo {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-grupo label {
            font-weight: bold;
            color: #022745;
            margin-bottom: 8px;
        }

        .form-grupo input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }

        .form-grupo input:focus {
            outline: none;
            border-color: #022745;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 12px;
            background-color: #FF6B35;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        .btn-cadastrar:hover {
            background-color: #e55a2b;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <img class="logo" src="images/logo.png" alt="Logo GO DRIVE">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="veiculos.html">Veículos</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="reserva.html">Reserva</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="simulador.html">Simulador</a></li>
                </ul>
            </nav>
        </header>

        <center>
            <main class="conteudo-cadastro">
                <h1>Cadastro de Cliente</h1>
                <form id="formCadastro" onsubmit="return validarCadastro()">
                    <div class="form-grupo">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="form-grupo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-grupo">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="11" required>
                    </div>
                    <div class="form-grupo">
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" name="idade" min="1" max="99" placeholder="Idade" required>
                    </div>
                    <div class="form-grupo">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    <button type="submit" class="btn-cadastrar">Finalizar Cadastro</button>
                </form>

                <script>


                function validarCadastro() {
            
                    var idade = document.getElementById("idade").value;

                    if (idade < 18) {
                    alert("Cadastro bloqueado: Menor de idade não pode alugar um veículo.");
                    return false; // No formato clássico via HTML, retornar false impede o envio
                    } else {
                    alert("Cadastro realizado com sucesso! Maior de idade, permissão para alugar veículo concedida.");
                    event.preventDefault();//impede que recarregue a página para que possa enviar à próxima pagina
                    window.location.href = "reserva.html";//Isso aqui envia o usuário pra tela de reserva 
                    }
                }

                   
                </script>
            </main>
            <br>
        </center>

        <footer>
            <div class="footer-content">
                <div class="rodape_box">
                    <p><strong>Acesse nossas redes:</strong></p>
                    <a href="https://Instagram.com/" target="_blank"><img class="icones" src="images/instagram.png"
                            alt="Instagram"></a>
                    <a href="https://web.whatsapp.com/" target="_blank"><img class="icones" src="images/whatsapp.png"
                            alt="WhatsApp"></a>
                    <a href="https://Facebook.com/" target="_blank"><img class="icones" src="images/facebook.png"
                            alt="Facebook"></a>
                    <p>©2026 - GO Drive - Todos os direitos reservados.</p>
                </div>
                <div class="rodape_box">
                    <p><strong>Endereço:</strong></p>
                    <p>Rua Guarani - Ubatuba - SP, 11680-000</p>
                    <p>Telefone: (11) 99999-9999</p>
                    <p>E-mail: contato@godrive.com.br</p>
                </div>
            </div>
        </footer>
    </div>



</body>

</html>
