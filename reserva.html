<!DOCTYPE HTML>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO DRIVE - RESERVA</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <style>
        .conteudo-reserva {
            max-width: 600px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: left;
            font-family: Arial, sans-serif;
        }
        .conteudo-reserva h1 {
            color: #022745;
            border-bottom: 3px solid #FF6B35;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }
        .form-grupo {
            margin-bottom: 20px;
        }
        .form-grupo label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #022745;
        }
        .form-grupo input, .form-grupo select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .form-grupo input:focus, .form-grupo select:focus {
            outline: none;
            border-color: #022745;
        }
        .datas-container {
            display: flex;
            gap: 15px;
        }
        .datas-container .form-grupo {
            flex: 1;
        }
        .btn-enviar-reserva {
            width: 100%;
            padding: 12px;
            background-color: #FF6B35;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn-enviar-reserva:hover {
            background-color: #e55a2b;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <img class="logo" src="images/logo.png" alt="Logo GO DRIVE">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="veiculos.html">Veículos</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="reserva.html">Reserva</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="simulador.html">Simulador</a></li>
                </ul>
            </nav>
        </header>

        <center> 
            <main class="conteudo-reserva">
                <h1>Formulário de Locação</h1>
                <form action="#" method="POST">
                    <div class="form-grupo">
                        <label for="nome">Nome do Cliente:</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-grupo">
                        <label for="carro">Carro Selecionado:</label>
                        <select id="carro" name="carro" required>
                            <option value="" disabled selected>Selecione um veículo...</option>
                            <option value="hb20">Hyundai HB20</option>
                            <option value="onix">Chevrolet Onix</option>
                            <option value="gol">Volkswagen Gol</option>
                            <option value="onix">Chevrolet Onix</option>
                            <option value="uno">Fiat Uno</option>
                            <option value="palio">Fiat Palio</option>
                            <option value="kwid">Renault Kwid</option>
                            <option value="tcross">Volkswagen T-Cross</option>
                            <option value="trail">Chevrolet Trailblazer</option>
                            <option value="creta">Hyundai Creta</option>
                        
                        </select>
                    </div>
                    <div class="datas-container">
                        <div class="form-grupo">
                            <label for="data-retirada">Data de Retirada:</label>
                            <input type="date" id="data-retirada" name="data_retirada" required>
                        </div>
                        <div class="form-grupo">
                            <label for="data-devolucao">Data de Devolução:</label>
                            <input type="date" id="data-devolucao" name="data_devolucao" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-enviar-reserva">Enviar Solicitação</button>
                </form>
            </main>
            <br>
        </center>

        <footer>
            <div class="footer-content">
                <div class="rodape_box">
                    <p><strong>Acesse nossas redes:</strong></p>
                    <a href="https://Instagram.com/" target="_blank"><img class="icones" src="images/instagram.png" alt="Instagram"></a> 
                    <a href="https://web.whatsapp.com/" target="_blank"><img class="icones" src="images/whatsapp.png" alt="WhatsApp"></a> 
                    <a href="https://Facebook.com/" target="_blank"><img class="icones" src="images/facebook.png" alt="Facebook"></a>
                    <p>©2026 - GO Drive - Todos os direitos reservados.</p>
                </div>
                <div class="rodape_box">
                    <p><strong>Endereço:</strong></p>
                    <p>Rua Guarani - Ubatuba - SP, 11680-000</p>
                    <p>Telefone: (11) 99999-9999</p>
                    <p>E-mail: contato@godrive.com.br</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
